---
# =============================================================================
# Ansible Role: Apache Tomcat App - Tasks: Main
# =============================================================================
# Orchestrates role execution in order.
# Flow: assert → jdbc_drivers → config_files → writable_dirs → logrotate → systemd → contexts → purge
# =============================================================================

- name: TomcatApp | assert | Validate all role variables
  ansible.builtin.include_tasks: assert.yml
  tags:
    - always
    - validate

- name: TomcatApp | jdbc_drivers | Install JDBC drivers
  ansible.builtin.include_tasks: jdbc_drivers.yml
  when:
    - tomcat_app_jdbc_drivers | length > 0
  tags:
    - configure
    - jdbc

- name: TomcatApp | config_files | Deploy application config files
  ansible.builtin.include_tasks: config_files.yml
  when:
    - tomcat_app_contexts | selectattr('config_files', 'defined') | list | length > 0
  tags:
    - configure
    - config

- name: TomcatApp | writable_dirs | Create custom writable directories
  ansible.builtin.include_tasks: writable_dirs.yml
  when:
    - tomcat_app_contexts | selectattr('writable_dirs', 'defined') | list | length > 0
  tags:
    - configure
    - writable_dirs

- name: TomcatApp | logrotate | Deploy per-app logrotate configuration
  ansible.builtin.include_tasks: logrotate.yml
  when:
    - tomcat_app_contexts | selectattr('logrotate', 'defined') | list | length > 0
  tags:
    - configure
    - logrotate

- name: TomcatApp | systemd | Configure systemd overrides for writable directories
  ansible.builtin.include_tasks: systemd.yml
  tags:
    - configure
    - systemd

- name: TomcatApp | contexts | Deploy application context files
  ansible.builtin.include_tasks: contexts.yml
  when:
    - tomcat_app_contexts | length > 0
  tags:
    - configure
    - contexts

- name: TomcatApp | purge | Remove unmanaged context files
  ansible.builtin.include_tasks: purge.yml
  when:
    - tomcat_app_purge_unmanaged | bool
  tags:
    - configure
    - purge
