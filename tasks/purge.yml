---
# =============================================================================
# Ansible Role: Apache Tomcat App - Tasks: Purge
# =============================================================================
# Removes context XML files from conf/Catalina/localhost/ that are NOT defined
# in tomcat_app_contexts. Only runs when tomcat_app_purge_unmanaged is true.
# =============================================================================

- name: TomcatApp | purge | Find all context XML files
  ansible.builtin.find:
    paths: "{{ __tomcat_app_context_dir }}"
    patterns: "*.xml"
    file_type: file
  register: __tomcat_app_existing_contexts

- name: TomcatApp | purge | Build list of managed context filenames
  ansible.builtin.set_fact:
    __tomcat_app_managed_files: "{{ tomcat_app_contexts | map(attribute='name') | map('regex_replace', '$', '.xml') | list }}"

- name: TomcatApp | purge | Remove unmanaged context XML files
  become: true
  ansible.builtin.file:
    path: "{{ purge_item.path }}"
    state: absent
  loop: "{{ __tomcat_app_existing_contexts.files }}"
  loop_control:
    loop_var: purge_item
    label: "{{ purge_item.path | basename }}"
  when:
    - purge_item.path | basename not in __tomcat_app_managed_files
  notify:
    - TomcatApp | handlers | Restart Tomcat service

- name: TomcatApp | purge | Find all Tomcat App logrotate files
  ansible.builtin.find:
    paths: "{{ __tomcat_app_logrotate_dir }}"
    contains: 'Apache Tomcat App - Logrotate Configuration'
    file_type: file
  register: __tomcat_app_existing_logrotate_files

- name: TomcatApp | purge | Build list of managed logrotate filenames
  ansible.builtin.set_fact:
    __tomcat_app_managed_logrotate: >-
      {{ tomcat_app_contexts
         | selectattr('logrotate', 'defined')
         | map(attribute='name')
         | list }}

- name: TomcatApp | purge | Remove unmanaged logrotate files
  become: true
  ansible.builtin.file:
    path: "{{ purge_lr_item.path }}"
    state: absent
  loop: "{{ __tomcat_app_existing_logrotate_files.files }}"
  loop_control:
    loop_var: purge_lr_item
    label: "{{ purge_lr_item.path | basename }}"
  when:
    - purge_lr_item.path | basename not in __tomcat_app_managed_logrotate
