---
# =============================================================================
# Ansible Role: Apache Tomcat App - Handlers
# =============================================================================
# Service management operations triggered by tasks via notify directives.
# =============================================================================

- name: TomcatApp | handlers | Reload systemd
  become: true
  ansible.builtin.systemd:
    daemon_reload: true

- name: TomcatApp | handlers | Restart Tomcat service
  become: true
  ansible.builtin.systemd:
    name: "{{ tomcat_app_service_name }}"
    state: restarted
